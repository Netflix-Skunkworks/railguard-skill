# Application-specific settings
application_settings:
  # For application-generated cryptographic keys, use a key management service
  jwt:
    algorithm: "HS256"
    expiration_hours: 24
    # NOTE: JWT signing keys should be managed via a KMS, not hardcoded
    
  encryption:
    # NOTE: AES keys should be managed via a KMS, not hardcoded
    algorithm: "AES-256-CBC"
    
  rate_limiting:
    default_rate: 1000
    premium_rate: 5000
    
  cache:
    ttl_seconds: 3600
    max_size: 10000

# Security configuration
security:
  cors:
    allowed_origins: 
      - "https://anime-app.example.com"
      - "https://admin.anime-app.example.com"
    allowed_methods: ["GET", "POST", "PUT", "DELETE"]
    allowed_headers: ["Content-Type", "Authorization"]
    allow_credentials: true
    
  session:
    timeout_minutes: 30
    secure_cookies: true
    same_site: "strict"
    
  api:
    require_https: true
    max_request_size: "10MB"
    timeout_seconds: 30

# Monitoring and observability
monitoring:
  metrics:
    enabled: true
    port: 9090
    
  logging:
    level: "INFO"
    format: "json"
    
  tracing:
    enabled: true
    sampling_rate: 0.1

# Feature flags
features:
  new_recommendation_algorithm: true
  experimental_ui: false
  premium_features: true
  analytics_tracking: true
